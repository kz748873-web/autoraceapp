<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/base :: commonHead('TOPページ | オートレース予想補助アプリ')}"></th:block>
    <style>
        .site-header .app-theme-toolbar {
            display: none;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 1030;
        }

        .site-header-nav {
            display: flex !important;
            flex-wrap: nowrap !important;
            gap: 0.7rem !important;
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 0.15rem 0 0.35rem;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .site-header-nav .btn {
            flex: 0 0 auto;
            min-height: 3rem;
            padding: 0.82rem 1rem;
            border-radius: 1rem;
            white-space: nowrap;
            font-size: 0.98rem;
            font-weight: 700;
        }

        .site-header-nav .btn[href="/"],
        .site-header-nav .btn[href="/home"] {
            background: var(--surface-tint, #edf5fd) !important;
            color: var(--accent-color, #1f4f83) !important;
            border-color: var(--main-color, #84acd9) !important;
        }

        body {
            --main-color: #84acd9;
            --accent-color: #1f4f83;
            --border-color: #cbdced;
            --surface-tint: #edf5fd;
            --main-color-text: #ffffff;
        }

        body.theme-kawaguchi {
            --main-color: #d96aa0;
            --accent-color: #8b2c5b;
            --border-color: #e9b5cf;
            --surface-tint: #f9e1eb;
            --main-color-text: #ffffff;
        }

        body.theme-isesaki {
            --main-color: #49515c;
            --accent-color: #2f3640;
            --border-color: #c4cad2;
            --surface-tint: #e5e9ee;
            --main-color-text: #ffffff;
        }

        body.theme-hamamatsu {
            --main-color: #4d8fd6;
            --accent-color: #21558b;
            --border-color: #c5dbf4;
            --surface-tint: #e3eefb;
            --main-color-text: #ffffff;
        }

        body.theme-iizuka {
            --main-color: #d4ad2d;
            --accent-color: #6f5600;
            --border-color: #ead48b;
            --surface-tint: #fff6d6;
            --main-color-text: #3f3200;
        }

        body.theme-sanyo {
            --main-color: #d88949;
            --accent-color: #8f5728;
            --border-color: #ecc5a6;
            --surface-tint: #fcebdd;
            --main-color-text: #ffffff;
        }

        body .btn-primary {
            background-color: var(--main-color) !important;
            border-color: var(--main-color) !important;
            color: var(--main-color-text) !important;
        }

        body .btn-outline-primary {
            color: var(--accent-color) !important;
            border-color: var(--border-color) !important;
            background: #ffffff !important;
        }

        body .btn-outline-primary:hover,
        body .btn-outline-primary:focus {
            background: var(--surface-tint) !important;
            color: var(--accent-color) !important;
            border-color: var(--main-color) !important;
        }

        .top-hero,
        .section-box {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 1.25rem;
            box-shadow: 0 0.9rem 1.8rem rgba(18, 61, 106, 0.08);
        }

        .top-hero {
            padding: 1.25rem;
        }

        .section-box {
            padding: 1.2rem;
        }

        .section-title {
            margin: 0 0 0.6rem;
            color: var(--accent-color);
            font-size: 1.25rem;
            font-weight: 700;
        }

        .section-note,
        .summary-text,
        .link-note {
            color: #5f6f82;
            line-height: 1.7;
            font-size: 0.98rem;
        }

        .current-chip {
            display: inline-flex;
            align-items: center;
            min-height: 2.4rem;
            padding: 0.55rem 0.9rem;
            border-radius: 999px;
            background: var(--surface-tint);
            border: 1px solid var(--border-color);
            color: var(--accent-color);
            font-weight: 700;
        }

        .selector-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .live-frame {
            width: 100%;
            min-height: 220px;
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            background: #f7f9fc;
        }

        .official-link-grid,
        .venue-link-grid {
            display: grid;
            gap: 0.75rem;
        }

        .link-card {
            display: block;
            padding: 0.95rem 1rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            background: #ffffff;
            color: inherit;
            text-decoration: none;
        }

        .link-card:hover {
            background: var(--surface-tint);
        }

        .link-card-title {
            color: var(--accent-color);
            font-weight: 700;
        }

        .timer-status {
            color: #5f6f82;
            font-size: 0.94rem;
            line-height: 1.5;
        }

        .floating-timer-panel {
            position: fixed;
            right: 1rem;
            bottom: 1rem;
            z-index: 1070;
            width: min(300px, calc(100vw - 2rem));
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            background: #ffffff;
            box-shadow: 0 1rem 2rem rgba(13, 79, 139, 0.16);
            overflow: hidden;
        }

        .floating-timer-panel.is-collapsed .floating-timer-body {
            display: none;
        }

        .floating-timer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            padding: 0.8rem 0.9rem;
            background: var(--surface-tint);
        }

        .floating-timer-title {
            color: var(--accent-color);
            font-size: 0.98rem;
            font-weight: 700;
        }

        .timer-clock {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--accent-color);
        }

        .floating-timer-body {
            padding: 0.9rem;
        }

        .timer-toggle-btn,
        .timer-preset-btn,
        .timer-stop-btn,
        .timer-strength-select {
            min-height: 2.5rem;
        }

        .timer-button-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.5rem;
        }

        body .floating-memo-wrapper {
            right: 1rem;
            z-index: 1080;
        }

        body .floating-memo-wrapper > .btn {
            min-height: 2.8rem;
            padding: 0.6rem 1rem;
            font-size: 0.95rem;
        }

        body .floating-memo-panel {
            width: min(320px, calc(100vw - 2rem));
        }

        @media (max-width: 575.98px) {
            .top-hero,
            .section-box {
                padding: 1rem;
            }

            .live-frame {
                min-height: 200px;
            }

            .floating-timer-panel {
                width: min(280px, calc(100vw - 1.5rem));
                right: 0.75rem;
                bottom: 0.75rem;
            }

            body .floating-memo-wrapper {
                right: 0.75rem;
            }

            .timer-button-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <div th:replace="~{layout/header :: siteHeader}"></div>

        <main class="container py-4 pb-5">
            <section class="top-hero mb-4">
                <div class="d-flex flex-column gap-2">
                    <span class="current-chip">TOPページ</span>
                    <h2 class="section-title mb-0">レース場とレース番号を選んで次に進めます</h2>
                    <p class="section-note mb-0">表示復旧を優先した安全構成です。</p>
                </div>
            </section>

            <div class="row g-4">
                <div class="col-12 col-lg-7">
                    <section class="section-box mb-4">
                        <h3 class="section-title">予想準備</h3>
                        <p class="section-note">レース場とレース番号を選ぶ基本操作だけを安全に残しています。</p>

                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="venueSelect" class="form-label fw-semibold">レース場</label>
                                <select id="venueSelect" class="form-select form-select-lg">
                                    <option value="">レース場を選択</option>
                                    <option th:each="venueName : ${venueNames}"
                                            th:value="${venueName}"
                                            th:text="${venueName}"
                                            th:selected="${venueName == selectedVenue}"
                                            th:attr="data-theme-key=${
                                                venueName == '川口' ? 'kawaguchi' :
                                                venueName == '伊勢崎' ? 'isesaki' :
                                                venueName == '浜松' ? 'hamamatsu' :
                                                venueName == '飯塚' ? 'iizuka' :
                                                venueName == '山陽' ? 'sanyo' : ''
                                            }">川口</option>
                                </select>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="raceNumberSelect" class="form-label fw-semibold">レース番号</label>
                                <select id="raceNumberSelect" class="form-select form-select-lg">
                                    <option value="">レース番号を選択</option>
                                    <option th:each="raceNumber : ${#numbers.sequence(1, 12)}"
                                            th:value="${raceNumber}"
                                            th:text="${raceNumber + 'レース'}">1レース</option>
                                </select>
                            </div>
                        </div>

                        <div class="mt-3">
                            <div id="selectionSummary" class="summary-text">未選択 / 未選択</div>
                        </div>

                        <div class="selector-actions mt-3">
                            <a class="btn btn-primary btn-lg" href="https://autoraceapp.onrender.com/records/new">新規登録</a>
                            <a class="btn btn-outline-primary btn-lg" href="https://autoraceapp.onrender.com/records">記録一覧</a>
                        </div>

                        <div class="row g-2 mt-3">
                            <div class="col-6">
                                <div class="current-chip w-100 justify-content-center" id="selectorVenueSummary">未選択</div>
                            </div>
                            <div class="col-6">
                                <div class="current-chip w-100 justify-content-center" id="selectorRaceSummary">未選択</div>
                            </div>
                        </div>
                    </section>

                    <section class="section-box mb-4">
                        <h3 class="section-title">公式リンク</h3>
                        <div class="official-link-grid">
                            <a th:each="link : ${officialRelatedLinks}"
                               th:href="${link.url}"
                               target="_blank"
                               rel="noopener noreferrer"
                               class="link-card">
                                <div class="link-card-title" th:text="${link.siteName}">公式サイト</div>
                                <div class="link-note" th:text="${link.note}">リンク説明</div>
                            </a>
                        </div>
                    </section>
                </div>

                <div class="col-12 col-lg-5">
                    <section class="section-box mb-4">
                        <h3 class="section-title">ライブ動画</h3>
                        <p class="section-note">
                            <span id="currentVenueLabel" th:text="${selectedVenue}">会場</span>
                            の動画枠です。
                        </p>
                        <iframe
                            class="live-frame"
                            data-venue-live-frame
                            src="about:blank"
                            title="venue live"
                            loading="lazy"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            referrerpolicy="strict-origin-when-cross-origin"
                            allowfullscreen></iframe>
                        <p class="link-note mt-3 mb-0" data-venue-live-note>レース場を選ぶと動画枠が切り替わります。</p>
                    </section>

                    <section class="section-box mb-4">
                        <h3 class="section-title">選択中の情報</h3>
                        <div class="d-flex flex-wrap gap-2">
                            <span class="current-chip" id="selectedVenueChip" th:text="${selectedVenue}">会場</span>
                            <span class="current-chip" id="currentRaceNumberLabel">未選択</span>
                        </div>
                    </section>

                    <section class="section-box">
                        <h3 class="section-title">補助機能</h3>
                        <p class="section-note mb-0">固定UIは残していますが、初期化で落ちないよう一時的に機能を絞っています。</p>
                    </section>
                </div>
            </div>
        </main>

        <div id="floatingTimerPanel" class="floating-timer-panel is-collapsed" data-panel-open="false">
            <div class="floating-timer-header">
                <div>
                    <div class="floating-timer-title">当日判断タイマー</div>
                    <div id="floatingTimerClock" class="timer-clock">20:00</div>
                </div>
                <button type="button" id="floatingTimerToggleBtn" class="btn btn-outline-primary timer-toggle-btn" aria-expanded="false">開く</button>
            </div>
            <div class="floating-timer-body">
                <div id="floatingTimerStatus" class="timer-status mb-3">一時停止中です。</div>
                <label class="form-label fw-semibold" for="floatingTimerStrengthSelect">バイブの強さ</label>
                <select id="floatingTimerStrengthSelect" class="form-select timer-strength-select mb-3">
                    <option value="300">弱め</option>
                    <option value="500" selected>標準</option>
                    <option value="800">強め</option>
                </select>
                <div class="timer-button-grid">
                    <button type="button" class="btn btn-outline-primary timer-preset-btn" data-timer-seconds="1200" disabled>20分</button>
                    <button type="button" class="btn btn-outline-primary timer-preset-btn" data-timer-seconds="600" disabled>10分</button>
                    <button type="button" class="btn btn-outline-primary timer-preset-btn" data-timer-seconds="300" disabled>5分</button>
                    <button type="button" class="btn btn-outline-primary timer-preset-btn" data-timer-seconds="180" disabled>3分</button>
                    <button type="button" class="btn btn-outline-primary timer-preset-btn" data-timer-seconds="60" disabled>1分</button>
                    <button type="button" class="btn btn-outline-secondary timer-stop-btn" data-timer-stop disabled>停止</button>
                </div>
            </div>
        </div>

        <div th:replace="~{layout/floating-memo :: floatingMemo}"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
            crossorigin="anonymous"></script>
    <script>
        // White screen recovery: timer, memo persistence, and advanced video behavior are intentionally paused.
        const venueYoutubeLives = {
            kawaguchi: { label: "Kawaguchi", youtubeUrl: "" },
            isesaki: { label: "Isesaki", youtubeUrl: "" },
            hamamatsu: { label: "Hamamatsu", youtubeUrl: "" },
            iizuka: { label: "Iizuka", youtubeUrl: "" },
            sanyo: { label: "Sanyo", youtubeUrl: "" }
        };

        function updateSelectionSummary() {
            const venueSelect = document.getElementById("venueSelect");
            const raceNumberSelect = document.getElementById("raceNumberSelect");
            const summary = document.getElementById("selectionSummary");
            const selectorVenueSummary = document.getElementById("selectorVenueSummary");
            const selectorRaceSummary = document.getElementById("selectorRaceSummary");
            const currentVenueLabel = document.getElementById("currentVenueLabel");
            const currentRaceNumberLabel = document.getElementById("currentRaceNumberLabel");
            const selectedVenueChip = document.getElementById("selectedVenueChip");

            const venueText = venueSelect && venueSelect.value ? venueSelect.value : "未選択";
            const raceText = raceNumberSelect && raceNumberSelect.value ? raceNumberSelect.value + "レース" : "未選択";

            if (summary) {
                summary.textContent = venueText + " / " + raceText;
            }
            if (selectorVenueSummary) {
                selectorVenueSummary.textContent = venueText;
            }
            if (selectorRaceSummary) {
                selectorRaceSummary.textContent = raceText;
            }
            if (currentVenueLabel) {
                currentVenueLabel.textContent = venueText;
            }
            if (currentRaceNumberLabel) {
                currentRaceNumberLabel.textContent = raceText;
            }
            if (selectedVenueChip) {
                selectedVenueChip.textContent = venueText;
            }
        }

        function getSelectedVenueContext() {
            const venueSelect = document.getElementById("venueSelect");
            if (!venueSelect) {
                return { name: "", themeKey: "" };
            }

            const selectedOption = venueSelect.options[venueSelect.selectedIndex];
            return {
                name: venueSelect.value || "",
                themeKey: selectedOption && selectedOption.dataset ? selectedOption.dataset.themeKey || "" : ""
            };
        }

        function applyVenueTheme() {
            const body = document.body;
            if (!body) {
                return;
            }

            const themeMap = {
                kawaguchi: "theme-kawaguchi",
                isesaki: "theme-isesaki",
                hamamatsu: "theme-hamamatsu",
                iizuka: "theme-iizuka",
                sanyo: "theme-sanyo"
            };

            Object.keys(themeMap).forEach(function (key) {
                body.classList.remove(themeMap[key]);
            });

            const venueContext = getSelectedVenueContext();
            if (venueContext.themeKey && themeMap[venueContext.themeKey]) {
                body.classList.add(themeMap[venueContext.themeKey]);
            }
        }

        function resolveVenueLiveEmbedUrl(youtubeUrl) {
            if (!youtubeUrl) {
                return "about:blank";
            }

            if (youtubeUrl.indexOf("/embed/") !== -1) {
                return youtubeUrl;
            }

            try {
                const parsedUrl = new URL(youtubeUrl);
                const videoId = parsedUrl.searchParams.get("v");
                if (videoId) {
                    return "https://www.youtube.com/embed/" + videoId;
                }

                if (parsedUrl.hostname.indexOf("youtu.be") !== -1) {
                    const shortId = parsedUrl.pathname.replace(/^\/+/, "");
                    return shortId ? "https://www.youtube.com/embed/" + shortId : "about:blank";
                }
            } catch (error) {
                return "about:blank";
            }

            return "about:blank";
        }

        function updateVenueLinkedPanels() {
            const venueContext = getSelectedVenueContext();
            const liveConfig = venueContext.themeKey ? venueYoutubeLives[venueContext.themeKey] : null;
            const liveUrl = liveConfig ? resolveVenueLiveEmbedUrl(liveConfig.youtubeUrl) : "about:blank";
            const liveFrames = document.querySelectorAll("[data-venue-live-frame]");
            const liveNotes = document.querySelectorAll("[data-venue-live-note]");

            liveFrames.forEach(function (frame) {
                if (!frame) {
                    return;
                }
                frame.src = liveUrl;
                frame.title = liveConfig ? liveConfig.label + " live" : "venue live";
            });

            liveNotes.forEach(function (note) {
                if (!note) {
                    return;
                }

                if (venueContext.name && liveConfig && liveConfig.youtubeUrl) {
                    note.textContent = "ライブ動画を表示中です。";
                } else if (venueContext.name) {
                    note.textContent = "動画URLは未設定です。";
                } else {
                    note.textContent = "レース場を選ぶと動画枠が切り替わります。";
                }
            });
        }

        function initializeHomePage() {
            const venueSelect = document.getElementById("venueSelect");
            const raceNumberSelect = document.getElementById("raceNumberSelect");
            const searchParams = new URLSearchParams(window.location.search);

            if (venueSelect && searchParams.get("venue")) {
                venueSelect.value = searchParams.get("venue");
            }
            if (raceNumberSelect && searchParams.get("raceNumber")) {
                raceNumberSelect.value = searchParams.get("raceNumber");
            }

            updateSelectionSummary();
            applyVenueTheme();
            updateVenueLinkedPanels();

            if (venueSelect) {
                venueSelect.addEventListener("change", function () {
                    updateSelectionSummary();
                    applyVenueTheme();
                    updateVenueLinkedPanels();
                });
            }

            if (raceNumberSelect) {
                raceNumberSelect.addEventListener("change", updateSelectionSummary);
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
            try {
                initializeHomePage();
            } catch (error) {
                console.error("home/index initialization error", error);
            }
        });
    </script>
</body>
</html>
