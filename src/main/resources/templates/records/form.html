<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>&#12524;&#12540;&#12473;&#35352;&#37682;&#30331;&#37682;</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
        crossorigin="anonymous">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>
<body class="bg-light">
    <main class="container py-4 py-md-5">
        <div class="mb-4">
            <h1 class="h2 fw-bold mb-2">&#12524;&#12540;&#12473;&#35352;&#37682;&#30331;&#37682;</h1>
            <p class="text-secondary mb-0">&#24517;&#35201;&#12394;&#20869;&#23481;&#12434;&#19978;&#12363;&#12425;&#38918;&#30058;&#12395;&#20837;&#21147;&#12375;&#12390;&#12289;&#12524;&#12540;&#12473;&#35352;&#37682;&#12434;&#20445;&#23384;&#12375;&#12414;&#12377;&#12290;</p>
        </div>

        <form th:action="@{/records}" th:object="${record}" method="post" class="vstack gap-4">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 p-md-5">
                    <h2 class="h4 mb-4">&#22522;&#26412;&#24773;&#22577;</h2>
                    <div class="row g-4">
                        <div class="col-md-4">
                            <label for="raceDate" class="form-label fw-semibold">&#38283;&#20652;&#26085;</label>
                            <input type="date" id="raceDate" th:field="*{raceDate}" class="form-control form-control-lg" required>
                        </div>
                        <div class="col-md-4">
                            <label for="venue" class="form-label fw-semibold">&#12524;&#12540;&#12473;&#22580;</label>
                            <select id="venue" th:field="*{venue}" class="form-select form-select-lg" required>
                                <option value="">&#36984;&#25246;&#12375;&#12390;&#12367;&#12384;&#12373;&#12356;</option>
                                <option value="&#24029;&#21475;">&#24029;&#21475;</option>
                                <option value="&#20234;&#21218;&#23822;">&#20234;&#21218;&#23822;</option>
                                <option value="&#27996;&#26494;">&#27996;&#26494;</option>
                                <option value="&#39151;&#22618;">&#39151;&#22618;</option>
                                <option value="&#23665;&#38525;">&#23665;&#38525;</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="raceNumber" class="form-label fw-semibold">&#12524;&#12540;&#12473;&#30058;&#21495;</label>
                            <select id="raceNumber" th:field="*{raceNumber}" class="form-select form-select-lg" required>
                                <option value="">&#36984;&#25246;&#12375;&#12390;&#12367;&#12384;&#12373;&#12356;</option>
                                <option th:each="num : ${#numbers.sequence(1, 12)}" th:value="${num}" th:text="${num + '&#12524;&#12540;&#12473;'}">1&#12524;&#12540;&#12473;</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 p-md-5">
                    <h2 class="h4 mb-4">&#24403;&#26085;&#29366;&#27841;</h2>
                    <div class="row g-4">
                        <div class="col-md-4">
                            <label for="weatherCondition" class="form-label fw-semibold">&#22825;&#27671;</label>
                            <input type="text" id="weatherCondition" th:field="*{weatherCondition}" class="form-control form-control-lg" placeholder="&#20363;: &#26228;&#12428;">
                        </div>
                        <div class="col-md-4">
                            <label for="temperature" class="form-label fw-semibold">&#27671;&#28201;</label>
                            <input type="text" id="temperature" th:field="*{temperature}" class="form-control form-control-lg" placeholder="&#20363;: 20&#8451;">
                        </div>
                        <div class="col-md-4">
                            <label for="humidity" class="form-label fw-semibold">&#28287;&#24230;</label>
                            <input type="text" id="humidity" th:field="*{humidity}" class="form-control form-control-lg" placeholder="&#20363;: 60%">
                        </div>
                        <div class="col-md-6">
                            <label for="trackTemperature" class="form-label fw-semibold">&#36208;&#36335;&#28201;&#24230;</label>
                            <input type="text" id="trackTemperature" th:field="*{trackTemperature}" class="form-control form-control-lg" placeholder="&#20363;: 28&#8451;" required>
                        </div>
                        <div class="col-md-6">
                            <label for="trackCondition" class="form-label fw-semibold">&#36208;&#36335;&#29366;&#27841;</label>
                            <select id="trackCondition" th:field="*{trackCondition}" class="form-select form-select-lg" required>
                                <option value="">&#36984;&#25246;&#12375;&#12390;&#12367;&#12384;&#12373;&#12356;</option>
                                <option value="&#33391;&#36208;&#36335;">&#33391;&#36208;&#36335;</option>
                                <option value="&#26001;&#36208;&#36335;">&#26001;&#36208;&#36335;</option>
                                <option value="&#28287;&#36208;&#36335;">&#28287;&#36208;&#36335;</option>
                                <option value="&#39080;">&#39080;</option>
                                <option value="&#33618;">&#33618;</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 p-md-5">
                    <h2 class="h4 mb-4">&#20104;&#24819;</h2>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label for="featuredRider" class="form-label fw-semibold">&#27880;&#30446;&#36984;&#25163;</label>
                            <input type="text" id="featuredRider" th:field="*{featuredRider}" class="form-control form-control-lg" placeholder="&#20363;: &#22823;&#37117;&#22826;&#37070;">
                        </div>
                        <div class="col-md-6">
                            <label for="betType" class="form-label fw-semibold">&#36077;&#12369;&#24335;</label>
                            <select id="betType" th:field="*{betType}" class="form-select form-select-lg">
                                <option value="">&#36984;&#25246;&#12375;&#12390;&#12367;&#12384;&#12373;&#12356;</option>
                                <option value="&#21336;&#21213;">&#21336;&#21213;</option>
                                <option value="&#35079;&#21213;">&#35079;&#21213;</option>
                                <option value="&#12527;&#12452;&#12489;">&#12527;&#12452;&#12489;</option>
                                <option value="2&#36899;&#21336;">2&#36899;&#21336;</option>
                                <option value="2&#36899;&#35079;">2&#36899;&#35079;</option>
                                <option value="3&#36899;&#21336;">3&#36899;&#21336;</option>
                                <option value="3&#36899;&#35079;">3&#36899;&#35079;</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label for="finalPrediction" class="form-label fw-semibold">&#26368;&#32066;&#20104;&#24819;</label>
                            <input type="text" id="finalPrediction" th:field="*{finalPrediction}" class="form-control form-control-lg" placeholder="&#20363;: 1-2-3">
                        </div>
                        <div class="col-12">
                            <label for="note" class="form-label fw-semibold">&#20633;&#32771;</label>
                            <textarea id="note" th:field="*{note}" class="form-control form-control-lg" rows="4" placeholder="&#27671;&#12395;&#12394;&#12387;&#12383;&#12371;&#12392;&#12434;&#33258;&#30001;&#12395;&#20837;&#21147;&#12375;&#12390;&#12367;&#12384;&#12373;&#12356;&#12290;"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex flex-column flex-md-row gap-3">
                <button type="submit" class="btn btn-primary btn-lg px-4">&#20445;&#23384;&#12377;&#12427;</button>
                <a th:href="@{/records}" class="btn btn-outline-secondary btn-lg px-4">&#19968;&#35239;&#12408;&#25147;&#12427;</a>
            </div>
        </form>
    </main>
</body>
</html>
