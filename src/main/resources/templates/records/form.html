<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>レース記録登録</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
        crossorigin="anonymous">
</head>
<body class="bg-light">
    <main class="container py-5">
        <div class="mb-4">
            <h1 class="h2 mb-2">レース記録登録</h1>
            <p class="text-secondary mb-0">レースの情報を入力して記録できます。</p>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <form th:action="@{/records}" th:object="${record}" method="post">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label for="raceDate" class="form-label">開催日</label>
                            <input type="date" id="raceDate" th:field="*{raceDate}" class="form-control" placeholder="開催日を入力してください">
                        </div>

                        <div class="col-md-6">
                            <label for="venue" class="form-label">レース場</label>
                            <input type="text" id="venue" th:field="*{venue}" class="form-control" placeholder="例: 川口">
                        </div>

                        <div class="col-md-6">
                            <label for="raceNumber" class="form-label">レース番号</label>
                            <input type="number" id="raceNumber" th:field="*{raceNumber}" class="form-control" placeholder="例: 8">
                        </div>

                        <div class="col-md-6">
                            <label for="weather" class="form-label">天候</label>
                            <input type="text" id="weather" th:field="*{weather}" class="form-control" placeholder="例: 晴">
                        </div>

                        <div class="col-md-6">
                            <label for="featuredRider" class="form-label">注目選手</label>
                            <input type="text" id="featuredRider" th:field="*{featuredRider}" class="form-control" placeholder="例: 青山 周平">
                        </div>

                        <div class="col-md-6">
                            <label for="finalPrediction" class="form-label">最終予想</label>
                            <input type="text" id="finalPrediction" th:field="*{finalPrediction}" class="form-control" placeholder="例: 1-2-3">
                        </div>
                    </div>

                    <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <a th:href="@{/records}" class="btn btn-outline-secondary">一覧へ戻る</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
