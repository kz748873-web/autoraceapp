<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>レース記録一覧</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
        crossorigin="anonymous">
</head>
<body class="bg-light">
    <main class="container py-5">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
            <div>
                <h1 class="h2 mb-1">レース記録一覧</h1>
                <p class="text-secondary mb-0">これまでに登録したレース記録を確認できます。</p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/records/new}" class="btn btn-primary">新しく記録する</a>
                <a th:href="@{/}" class="btn btn-outline-secondary">ホームへ戻る</a>
            </div>
        </div>

        <div class="bg-white border rounded-4 shadow-sm p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th scope="col">開催日</th>
                            <th scope="col">レース場</th>
                            <th scope="col">レース番号</th>
                            <th scope="col">天候</th>
                            <th scope="col">注目選手</th>
                            <th scope="col">最終予想</th>
                            <th scope="col">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="record : ${records}">
                            <td th:text="${record.raceDate}">2026-03-31</td>
                            <td th:text="${record.venue}">川口</td>
                            <td th:text="${record.raceNumber}">8</td>
                            <td th:text="${record.weather}">晴</td>
                            <td th:text="${record.featuredRider}">青山 周平</td>
                            <td th:text="${record.finalPrediction}">1-2-3</td>
                            <td>
                                <a th:href="@{/records/{id}(id=${record.id})}" class="btn btn-sm btn-outline-primary">
                                    詳細を見る
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(records)}">
                            <td colspan="7" class="text-center text-secondary py-4">まだレース記録がありません。</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
