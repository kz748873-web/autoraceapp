<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/base :: commonHead('レース記録一覧 | オートレース予想補助アプリ')}"></th:block>
</head>
<body>
    <div class="app-shell d-flex flex-column">
    <div th:replace="~{layout/header :: siteHeader}"></div>
    <main class="container py-4 py-md-5 flex-grow-1">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
            <div>
                <h1 class="fw-bold mb-2">レース記録一覧</h1>
                <p class="text-secondary mb-0">登録したレース記録を、重要な項目だけに絞って見やすく確認できます。</p>
            </div>
            <div class="d-flex flex-column flex-sm-row gap-2">
                <a th:href="@{/records/new}" class="btn btn-primary btn-lg">新しく記録する</a>
                <a th:href="@{/}" class="btn btn-outline-secondary btn-lg">ホームへ戻る</a>
            </div>
        </div>

        <section class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-body p-4">
                <h2 class="h5 fw-bold mb-3">検索</h2>
                <form method="get" th:action="@{/records}">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label for="venue" class="form-label fw-semibold">レース場</label>
                            <select id="venue" name="venue" class="form-select form-select-lg">
                                <option value="">すべて</option>
                                <option value="川口" th:selected="${selectedVenue == '川口'}">川口</option>
                                <option value="伊勢崎" th:selected="${selectedVenue == '伊勢崎'}">伊勢崎</option>
                                <option value="浜松" th:selected="${selectedVenue == '浜松'}">浜松</option>
                                <option value="飯塚" th:selected="${selectedVenue == '飯塚'}">飯塚</option>
                                <option value="山陽" th:selected="${selectedVenue == '山陽'}">山陽</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="weatherCondition" class="form-label fw-semibold">天気</label>
                            <select id="weatherCondition" name="weatherCondition" class="form-select form-select-lg">
                                <option value="">すべて</option>
                                <option value="晴れ" th:selected="${weatherCondition == '晴れ'}">晴れ</option>
                                <option value="曇り" th:selected="${weatherCondition == '曇り'}">曇り</option>
                                <option value="小雨" th:selected="${weatherCondition == '小雨'}">小雨</option>
                                <option value="雨" th:selected="${weatherCondition == '雨'}">雨</option>
                                <option value="雪" th:selected="${weatherCondition == '雪'}">雪</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="featuredRider" class="form-label fw-semibold">注目選手</label>
                            <input type="text" id="featuredRider" name="featuredRider" class="form-control form-control-lg" placeholder="例: 青山周平" th:value="${featuredRider}">
                        </div>

                        <div class="col-12 d-flex flex-column flex-sm-row gap-2 mt-2">
                            <button type="submit" class="btn btn-primary btn-lg">検索する</button>
                            <a th:href="@{/records}" class="btn btn-outline-secondary btn-lg">条件をリセット</a>
                        </div>
                    </div>
                </form>
            </div>
        </section>

        <section class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th scope="col">開催日</th>
                                <th scope="col">レース場</th>
                                <th scope="col">レース番号</th>
                                <th scope="col">天気</th>
                                <th scope="col">走路状況</th>
                                <th scope="col">本命印の選手</th>
                                <th scope="col">賭け式</th>
                                <th scope="col">何点買い</th>
                                <th scope="col">購入金額</th>
                                <th scope="col">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="record : ${records}">
                                <td th:text="${record.raceDate}">2026-04-02</td>
                                <td th:text="${record.venue}">川口</td>
                                <td th:text="${record.raceNumber != null ? record.raceNumber + 'レース' : '未入力'}">8レース</td>
                                <td th:text="${record.weatherCondition} ?: '未入力'">晴れ</td>
                                <td th:text="${record.trackCondition} ?: '未入力'">良走路</td>
                                <td th:text="${record.featuredRider1Mark == '◎' ? record.featuredRider1Name : (record.featuredRider2Mark == '◎' ? record.featuredRider2Name : (record.featuredRider3Mark == '◎' ? record.featuredRider3Name : '未設定'))}">青山周平</td>
                                <td th:text="${record.betType} ?: '未入力'">3連単</td>
                                <td th:text="${record.betCount != null ? record.betCount + '点' : '未入力'}">6点</td>
                                <td th:text="${record.purchaseAmount != null ? record.purchaseAmount + '円' : '未入力'}">600円</td>
                                <td><a th:href="@{/records/{id}(id=${record.id})}" class="btn btn-outline-primary btn-sm">内容を見る</a></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(records)}">
                                <td colspan="10" class="text-center text-secondary py-4">条件に合うレース記録がありません。</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
    <div th:replace="~{layout/footer :: siteFooter}"></div>
    <div th:replace="~{layout/floating-memo :: floatingMemo}"></div>
    </div>
    <th:block th:replace="~{layout/base :: commonScripts}"></th:block>
</body>
</html>
