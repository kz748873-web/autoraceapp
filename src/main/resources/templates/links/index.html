<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/base :: commonHead('外部リンク一覧 | オートレース予想補助アプリ')}"></th:block>
    <style>
        .page-card {
            border: 1px solid #d9e3f0;
            border-radius: 1.25rem;
            box-shadow: 0 0.5rem 1rem rgba(13, 79, 139, 0.08);
            background: #ffffff;
        }

        .venue-select-btn,
        .link-btn,
        .social-link-btn {
            border-radius: 1rem;
            font-weight: 700;
        }

        .venue-select-btn,
        .link-btn {
            padding: 0.95rem 1rem;
            font-size: 1.02rem;
        }

        .social-link-btn {
            padding: 1rem 1.1rem;
            font-size: 1rem;
        }

        .youtube-btn {
            background: #ff0000;
            border-color: #ff0000;
            color: #ffffff;
        }

        .youtube-btn:hover {
            background: #d90000;
            border-color: #d90000;
            color: #ffffff;
        }

        .x-btn {
            background: #111111;
            border-color: #111111;
            color: #ffffff;
        }

        .x-btn:hover {
            background: #000000;
            border-color: #000000;
            color: #ffffff;
        }

        .instagram-btn {
            background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af, #515bd4);
            border: none;
            color: #ffffff;
        }

        .instagram-btn:hover {
            color: #ffffff;
            opacity: 0.92;
        }

        .mini-badge {
            display: inline-block;
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            background: var(--section-badge-bg);
            color: var(--deep);
            font-size: 0.9rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="app-shell d-flex flex-column">
        <div th:replace="~{layout/header :: siteHeader}"></div>
        <main class="container py-4 py-md-5 flex-grow-1">
            <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
                <div>
                    <h1 class="h2 fw-bold mb-2">外部リンク一覧</h1>
                    <p class="text-secondary mb-0">公式関連とレース場ごとの導線を、左右2カラムで見やすく整理しています。</p>
                </div>
                <div class="d-flex flex-column flex-sm-row gap-2">
                    <a th:href="@{/}" class="btn btn-outline-secondary btn-lg">TOPへ戻る</a>
                    <a th:href="@{/records/new}" class="btn btn-primary btn-lg">新しく記録する</a>
                </div>
            </div>

            <div class="row g-4 align-items-start">
                <div class="col-lg-4">
                    <div class="vstack gap-4">
                        <section class="page-card p-4">
                            <h2 class="h4 fw-bold mb-3">公式関連</h2>
                            <p class="text-secondary mb-3">公式サイトとファンクラブをまとめて置いています。</p>
                            <div class="vstack gap-3">
                                <a th:each="link : ${officialRelatedLinks}"
                                   th:href="${link.url}"
                                   th:text="${link.siteName}"
                                   target="_blank"
                                   rel="noopener noreferrer"
                                   class="btn btn-outline-primary btn-lg link-btn text-start">公式関連</a>
                            </div>
                        </section>

                        <section class="page-card p-4">
                            <h2 class="h4 fw-bold mb-3">オートレース場</h2>
                            <p class="text-secondary mb-3">会場を選ぶと、右側にその会場の公式サイトやSNS導線を表示します。</p>
                            <div class="vstack gap-2">
                                <a th:each="venueName : ${venueNames}"
                                   th:href="@{/links(venue=${venueName})}"
                                   th:text="${venueName}"
                                   th:classappend="${venueName == selectedVenue} ? ' btn-primary' : ' btn-outline-primary'"
                                   class="btn btn-lg venue-select-btn text-start">川口</a>
                            </div>
                        </section>
                    </div>
                </div>

                <div class="col-lg-8">
                    <section class="page-card p-4 p-md-5">
                        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                            <div>
                                <span class="mini-badge mb-2">選択中のレース場</span>
                                <div class="fs-2 fw-bold" th:text="${selectedVenue}">川口</div>
                            </div>
                            <a th:href="@{/(venue=${selectedVenue})}" class="btn btn-outline-secondary btn-lg">TOPでも見る</a>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <a th:if="${selectedVenueLinks['officialSite'] != null}"
                                   th:href="${selectedVenueLinks['officialSite'].url}"
                                   target="_blank"
                                   rel="noopener noreferrer"
                                   class="btn btn-outline-primary btn-lg w-100 social-link-btn">公式サイト</a>
                            </div>
                            <div class="col-md-6">
                                <a th:if="${selectedVenueLinks['youtube'] != null}"
                                   th:href="${selectedVenueLinks['youtube'].url}"
                                   target="_blank"
                                   rel="noopener noreferrer"
                                   class="btn btn-lg w-100 social-link-btn youtube-btn">YouTube</a>
                            </div>
                            <div class="col-md-6">
                                <a th:if="${selectedVenueLinks['x'] != null}"
                                   th:href="${selectedVenueLinks['x'].url}"
                                   target="_blank"
                                   rel="noopener noreferrer"
                                   class="btn btn-lg w-100 social-link-btn x-btn">X</a>
                            </div>
                            <div class="col-md-6">
                                <a th:if="${selectedVenueLinks['instagram'] != null}"
                                   th:href="${selectedVenueLinks['instagram'].url}"
                                   target="_blank"
                                   rel="noopener noreferrer"
                                   class="btn btn-lg w-100 social-link-btn instagram-btn">Instagram</a>
                            </div>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="border rounded-4 p-3 bg-light h-100">
                                    <div class="fw-semibold mb-2">会場公式サイト</div>
                                    <div class="text-secondary" th:text="${selectedVenueLinks['officialSite'] != null ? selectedVenueLinks['officialSite'].note : 'リンク準備中です。'}">会場の案内文</div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="border rounded-4 p-3 bg-light h-100">
                                    <div class="fw-semibold mb-2">YouTube・SNS案内</div>
                                    <div class="text-secondary">YouTube は実URLを設定済みです。X と Instagram は今後追加しやすいよう、会場ごとに分けて管理しています。</div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
        <div th:replace="~{layout/footer :: siteFooter}"></div>
        <div th:replace="~{layout/floating-memo :: floatingMemo}"></div>
    </div>
    <th:block th:replace="~{layout/base :: commonScripts}"></th:block>
</body>
</html>
