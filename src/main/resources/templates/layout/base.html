<th:block xmlns:th="http://www.thymeleaf.org">
    <th:block th:fragment="commonHead(pageTitle)">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title th:text="${pageTitle}">オートレース予想補助アプリ</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
            crossorigin="anonymous">
        <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
        <style>
            :root {
                --page-bg: #eef4fb;
                --page-bg-top: #f7fafe;
                --card: #c5d6ea;
                --main: #17304f;
                --sub: #5c7188;
                --brand: #bfd8fb;
                --brand-strong: #98bee9;
                --deep: #1d4d82;
                --surface: #ffffff;
                --soft-surface: #f5f9fe;
                --section-badge-bg: #e2edf9;
                --theme-text: #17304f;
                --btn-on-brand: #123253;
                --header-surface: rgba(255, 255, 255, 0.96);
                --hero-panel-bg: rgba(255, 255, 255, 0.78);
                --hero-panel-text: #18324f;
                --hero-panel-border: rgba(255, 255, 255, 0.75);
            }

            body {
                background: linear-gradient(180deg, var(--page-bg-top) 0%, var(--page-bg) 100%);
                color: var(--main);
            }

            .app-shell {
                min-height: 100vh;
            }

            .page-card,
            .section-card,
            .page-panel {
                background: var(--surface);
                border: 1px solid var(--card);
                border-radius: 1.35rem;
                box-shadow: 0 0.9rem 1.8rem rgba(18, 61, 106, 0.08);
            }

            .page-card,
            .section-card {
                position: relative;
                overflow: hidden;
            }

            .page-card::before,
            .section-card::before {
                content: "";
                position: absolute;
                inset: 0 auto auto 0;
                width: 100%;
                height: 0.28rem;
                background: linear-gradient(90deg, var(--brand-strong), rgba(255, 255, 255, 0));
                pointer-events: none;
            }

            .section-badge {
                display: inline-flex;
                padding: 0.5rem 0.85rem;
                border-radius: 999px;
                font-weight: 700;
                font-size: 0.9rem;
                background: var(--section-badge-bg);
                color: var(--deep);
                border: 1px solid color-mix(in srgb, var(--brand-strong) 55%, white);
            }

            .section-title {
                font-size: 1.45rem;
                font-weight: 700;
            }

            .helper-text {
                color: var(--sub);
                line-height: 1.7;
            }

            .site-header {
                background: var(--header-surface) !important;
                backdrop-filter: blur(10px);
            }

            .site-header-brand {
                display: flex;
                align-items: center;
                min-width: 14rem;
            }

            .site-header-brand-logo {
                display: inline-flex;
                align-items: center;
                width: min(18rem, 42vw);
                max-width: 100%;
                height: 4.25rem;
            }

            .site-header-logo-image {
                display: block;
                width: 100%;
                height: 100%;
                object-fit: contain;
                object-position: left center;
            }

            .btn-primary {
                background-color: var(--brand-strong) !important;
                border-color: var(--brand-strong) !important;
                color: var(--btn-on-brand) !important;
            }

            .btn-primary:hover,
            .btn-primary:focus {
                background-color: color-mix(in srgb, var(--brand-strong) 88%, black) !important;
                border-color: color-mix(in srgb, var(--brand-strong) 82%, black) !important;
                color: var(--btn-on-brand) !important;
            }

            .btn-outline-primary {
                color: var(--deep) !important;
                border-color: var(--brand-strong) !important;
                background: #ffffff !important;
            }

            .btn-outline-primary:hover,
            .btn-outline-primary:focus {
                background-color: var(--soft-surface) !important;
                border-color: var(--brand-strong) !important;
                color: var(--theme-text) !important;
            }

            .btn-outline-secondary {
                color: var(--theme-text) !important;
                border-color: color-mix(in srgb, var(--card) 75%, var(--brand-strong)) !important;
                background: #ffffff !important;
            }

            .btn-outline-secondary:hover,
            .btn-outline-secondary:focus {
                color: var(--theme-text) !important;
                border-color: var(--brand-strong) !important;
                background: var(--soft-surface) !important;
            }

            .text-primary {
                color: var(--deep) !important;
            }

            .app-footer-note {
                color: #60758b;
                font-size: 0.98rem;
            }

            @media (max-width: 991.98px) {
                .site-header-actions {
                    width: 100%;
                    align-items: stretch !important;
                    gap: 0.75rem !important;
                }

                .site-header-brand {
                    min-width: 0;
                }

                .site-header-actions > .d-flex {
                    width: 100%;
                    justify-content: space-between !important;
                    align-items: flex-start !important;
                }

                .site-header-nav {
                    width: 100%;
                    justify-content: flex-start !important;
                    row-gap: 0.7rem !important;
                }

                .site-header-nav .btn {
                    flex: 1 1 calc(50% - 0.5rem);
                    min-width: 0;
                    min-height: 3.1rem;
                }

            }

            @media (max-width: 575.98px) {
                .site-header-nav {
                    gap: 0.6rem !important;
                }

                .site-header-nav .btn {
                    flex: 1 1 calc(50% - 0.35rem);
                    padding: 0.8rem 0.7rem;
                    font-size: 0.96rem;
                }

                .site-header-brand-logo {
                    width: min(13.5rem, 68vw);
                    height: 3.25rem;
                }
            }
        </style>
    </th:block>

    <th:block th:fragment="commonScripts">
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
            crossorigin="anonymous"></script>
    </th:block>
</th:block>
