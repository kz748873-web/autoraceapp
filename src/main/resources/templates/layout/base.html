<th:block xmlns:th="http://www.thymeleaf.org">
    <th:block th:fragment="commonHead(pageTitle)">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title th:text="${pageTitle}">オートレース予想補助アプリ</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
            crossorigin="anonymous">
        <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
        <style>
            :root {
                --page-bg: #eef4fb;
                --page-bg-top: #f7fafe;
                --card: #c5d6ea;
                --main: #17304f;
                --sub: #5c7188;
                --brand: #bfd8fb;
                --brand-strong: #98bee9;
                --deep: #1d4d82;
                --surface: #ffffff;
                --soft-surface: #f5f9fe;
                --section-badge-bg: #e2edf9;
                --theme-text: #17304f;
                --btn-on-brand: #123253;
                --header-surface: rgba(255, 255, 255, 0.96);
                --hero-panel-bg: rgba(255, 255, 255, 0.78);
                --hero-panel-text: #18324f;
                --hero-panel-border: rgba(255, 255, 255, 0.75);
                --pit-red: #c5162e;
                --pit-ink: #111827;
            }

            body {
                background: linear-gradient(180deg, var(--page-bg-top) 0%, var(--page-bg) 100%);
                color: var(--main);
            }

            .app-shell {
                min-height: 100vh;
            }

            .page-card,
            .section-card,
            .page-panel {
                background: var(--surface);
                border: 1px solid var(--card);
                border-radius: 1.35rem;
                box-shadow: 0 0.9rem 1.8rem rgba(18, 61, 106, 0.08);
            }

            .page-card,
            .section-card {
                position: relative;
                overflow: hidden;
            }

            .page-card::before,
            .section-card::before {
                content: "";
                position: absolute;
                inset: 0 auto auto 0;
                width: 100%;
                height: 0.28rem;
                background: linear-gradient(90deg, var(--brand-strong), rgba(255, 255, 255, 0));
                pointer-events: none;
            }

            .section-badge {
                display: inline-flex;
                padding: 0.5rem 0.85rem;
                border-radius: 999px;
                font-weight: 700;
                font-size: 0.9rem;
                background: var(--section-badge-bg);
                color: var(--deep);
                border: 1px solid color-mix(in srgb, var(--brand-strong) 55%, white);
            }

            .section-title {
                font-size: 1.45rem;
                font-weight: 700;
            }

            .helper-text {
                color: var(--sub);
                line-height: 1.7;
            }

            .site-header {
                position: sticky;
                top: 0;
                z-index: 1030;
                background: var(--header-surface) !important;
                backdrop-filter: blur(10px);
                border-bottom-color: color-mix(in srgb, var(--pit-red) 26%, var(--card)) !important;
                box-shadow: 0 0.5rem 1.5rem rgba(17, 24, 39, 0.08) !important;
            }

            .site-header::after {
                content: "";
                display: block;
                height: 0.18rem;
                background: linear-gradient(90deg, var(--pit-ink), var(--pit-red), transparent 72%);
                opacity: 0.9;
            }

            .site-header .container {
                padding-top: 0.82rem !important;
                padding-bottom: 0.68rem !important;
            }

            .site-header-layout {
                align-items: center !important;
                gap: 0.85rem !important;
            }

            .site-header-brand {
                display: flex;
                align-items: center;
                flex: 0 0 auto;
                min-width: 11rem;
                padding-top: 0;
            }

            .site-header-brand-logo {
                display: inline-flex;
                align-items: center;
                width: clamp(12rem, 16vw, 15rem);
                max-width: 100%;
                height: auto;
            }

            .site-header-brand-logo::after {
                display: none;
            }

            .site-header-logo-image {
                display: block;
                width: 100%;
                height: auto;
                object-fit: contain;
                object-position: left center;
            }

            .site-header-actions {
                flex: 1 1 auto;
                min-width: 0;
                gap: 0.5rem !important;
                padding-top: 0;
            }

            .site-menu-row {
                display: flex;
                align-items: center;
                justify-content: flex-end;
                flex-wrap: nowrap !important;
                gap: 0.5rem;
                width: 100%;
                min-width: 0;
            }

            .site-header-nav {
                display: flex !important;
                flex: 1 1 auto;
                flex-wrap: nowrap !important;
                justify-content: flex-end;
                gap: 0.45rem !important;
                min-width: 0;
                overflow-x: auto;
                overflow-y: hidden;
                padding: 0.08rem 0.08rem 0.22rem;
                scrollbar-width: none;
                -webkit-overflow-scrolling: touch;
            }

            .site-header-nav::-webkit-scrollbar {
                display: none;
            }

            .site-header-nav .btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                flex: 0 0 auto;
                min-height: 2.35rem;
                padding: 0.42rem 0.74rem;
                border-radius: 0.72rem;
                font-size: 0.9rem;
                font-weight: 800;
                line-height: 1.2;
                white-space: nowrap;
                box-shadow: 0 0.32rem 0.85rem rgba(17, 24, 39, 0.07);
            }

            .site-venue-switch {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                flex: 0 0 auto;
                min-height: 2.35rem;
                padding: 0.24rem 0.32rem 0.24rem 0.5rem;
                border-radius: 0.72rem;
                background: color-mix(in srgb, var(--soft-surface) 82%, white);
                border: 1px solid color-mix(in srgb, var(--pit-red) 30%, var(--card));
                box-shadow: 0 0.32rem 0.85rem rgba(17, 24, 39, 0.07);
                color: var(--deep);
                font-weight: 800;
                white-space: nowrap;
            }

            .site-venue-current {
                display: inline-flex;
                align-items: center;
                gap: 0.28rem;
                padding: 0.22rem 0.38rem;
                border-radius: 0.56rem;
                background: #ffffff;
                border-left: 0.24rem solid var(--pit-red);
            }

            .site-venue-current-label {
                color: var(--sub);
                font-size: 0.72rem;
                font-weight: 800;
            }

            .site-venue-current-value {
                color: var(--pit-ink);
                font-size: 0.84rem;
                font-weight: 900;
            }

            .btn-primary {
                background-color: var(--brand-strong) !important;
                border-color: var(--brand-strong) !important;
                color: var(--btn-on-brand) !important;
            }

            .btn-primary:hover,
            .btn-primary:focus {
                background-color: color-mix(in srgb, var(--brand-strong) 88%, black) !important;
                border-color: color-mix(in srgb, var(--brand-strong) 82%, black) !important;
                color: var(--btn-on-brand) !important;
            }

            .btn-outline-primary {
                color: var(--deep) !important;
                border-color: var(--brand-strong) !important;
                background: #ffffff !important;
            }

            .btn-outline-primary:hover,
            .btn-outline-primary:focus {
                background-color: var(--soft-surface) !important;
                border-color: var(--brand-strong) !important;
                color: var(--theme-text) !important;
            }

            .btn-outline-secondary {
                color: var(--theme-text) !important;
                border-color: color-mix(in srgb, var(--card) 75%, var(--brand-strong)) !important;
                background: #ffffff !important;
            }

            .btn-outline-secondary:hover,
            .btn-outline-secondary:focus {
                color: var(--theme-text) !important;
                border-color: var(--brand-strong) !important;
                background: var(--soft-surface) !important;
            }

            .text-primary {
                color: var(--deep) !important;
            }

            .app-footer-note {
                color: #60758b;
                font-size: 0.98rem;
            }

            @media (max-width: 991.98px) {
                .site-header .container {
                    padding-top: 0.74rem !important;
                    padding-bottom: 0.62rem !important;
                }

                .site-header-layout {
                    align-items: flex-start !important;
                    gap: 0.55rem !important;
                }

                .site-header-actions {
                    width: 100%;
                    align-items: stretch !important;
                }

                .site-header-brand {
                    min-width: 0;
                }

                .site-header-brand-logo {
                    width: clamp(10.75rem, 38vw, 13rem);
                    height: auto;
                }

                .site-header-actions > .d-flex {
                    width: 100%;
                    justify-content: flex-start !important;
                    align-items: center !important;
                }

                .site-header-nav {
                    width: 100%;
                    justify-content: flex-start !important;
                }

                .site-header-nav .btn {
                    min-height: 2.3rem;
                }
            }

            @media (max-width: 575.98px) {
                .site-header .container {
                    padding-top: 0.66rem !important;
                    padding-bottom: 0.56rem !important;
                }

                .site-menu-row {
                    display: grid !important;
                    grid-template-columns: minmax(0, 1fr) auto;
                    align-items: center;
                    gap: 0.42rem;
                }

                .site-header-nav {
                    gap: 0.42rem !important;
                    padding-bottom: 0.18rem;
                }

                .site-header-nav .btn {
                    min-height: 2.22rem;
                    padding: 0.38rem 0.56rem;
                    border-radius: 0.66rem;
                    font-size: 0.82rem;
                }

                .site-header-brand-logo {
                    width: clamp(10.75rem, 58vw, 12.75rem);
                    height: auto;
                }

                .site-venue-switch {
                    min-height: 2.22rem;
                    padding: 0.2rem 0.26rem;
                    border-radius: 0.66rem;
                }

                .site-venue-current {
                    padding: 0.2rem 0.32rem;
                }

                .site-venue-current-label {
                    font-size: 0.68rem;
                }

                .site-venue-current-value {
                    font-size: 0.8rem;
                }
            }
        </style>
        <link rel="stylesheet" th:href="@{/css/venue-theme.css}">
    </th:block>

    <th:block th:fragment="commonScripts">
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
            crossorigin="anonymous"></script>
        <script th:src="@{/js/venue-theme.js}"></script>
    </th:block>
</th:block>
