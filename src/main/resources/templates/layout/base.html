<th:block xmlns:th="http://www.thymeleaf.org">
    <th:block th:fragment="commonHead(pageTitle)">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title th:text="${pageTitle}">オートレース予想補助アプリ</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
            crossorigin="anonymous">
        <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
        <style>
            :root {
                --page-bg: #eaf2fb;
                --page-bg-top: #f3f8fe;
                --card: #c7d8ec;
                --main: #17304f;
                --sub: #586f86;
                --brand: #c8defc;
                --brand-strong: #aecdff;
                --deep: #163b67;
                --surface: #ffffff;
                --soft-surface: #f4f8fd;
                --section-badge-bg: #deebfb;
                --theme-text: #17304f;
                --btn-on-brand: #122e4b;
            }

            body {
                background: linear-gradient(180deg, var(--page-bg-top) 0%, var(--page-bg) 100%);
                color: var(--main);
            }

            .app-shell {
                min-height: 100vh;
            }

            .page-card,
            .section-card,
            .page-panel {
                background: var(--surface);
                border: 1px solid var(--card);
                border-radius: 1.35rem;
                box-shadow: 0 0.9rem 1.8rem rgba(18, 61, 106, 0.1);
            }

            .section-badge {
                display: inline-flex;
                padding: 0.5rem 0.85rem;
                border-radius: 999px;
                font-weight: 700;
                font-size: 0.9rem;
                background: var(--section-badge-bg);
                color: var(--deep);
            }

            .section-title {
                font-size: 1.45rem;
                font-weight: 700;
            }

            .helper-text {
                color: var(--sub);
                line-height: 1.7;
            }

            .btn-primary {
                background-color: var(--brand) !important;
                border-color: var(--brand-strong) !important;
                color: var(--btn-on-brand) !important;
            }

            .btn-primary:hover,
            .btn-primary:focus {
                background-color: var(--brand-strong) !important;
                border-color: var(--brand-strong) !important;
                color: var(--btn-on-brand) !important;
            }

            .btn-outline-primary {
                color: var(--deep) !important;
                border-color: var(--brand-strong) !important;
                background: #ffffff !important;
            }

            .btn-outline-primary:hover,
            .btn-outline-primary:focus {
                background-color: var(--brand) !important;
                border-color: var(--brand-strong) !important;
                color: var(--theme-text) !important;
            }

            .text-primary {
                color: var(--deep) !important;
            }

            .app-theme-toolbar {
                display: inline-flex;
                align-items: center;
                justify-content: flex-end;
                gap: 0.35rem;
                flex-wrap: nowrap;
                padding: 0.2rem 0.35rem;
                border: 1px solid var(--card);
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.92);
            }

            .app-theme-label {
                font-size: 0.82rem;
                font-weight: 700;
                color: var(--sub);
                white-space: nowrap;
            }

            .app-theme-select {
                width: 118px;
                min-width: 118px;
                border-radius: 999px;
                border-color: var(--card);
                font-size: 0.82rem;
                line-height: 1.2;
                padding-top: 0.2rem;
                padding-bottom: 0.2rem;
                padding-left: 0.55rem;
                background-color: #ffffff;
                box-shadow: none;
            }

            .app-theme-dot {
                width: 0.72rem;
                height: 0.72rem;
                border-radius: 999px;
                border: 1px solid #ffffff;
                box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
                background: var(--brand);
                flex: 0 0 auto;
            }

            .app-footer-note {
                color: #60758b;
                font-size: 0.98rem;
            }

            @media (max-width: 991.98px) {
                .site-header-actions {
                    width: 100%;
                    align-items: stretch !important;
                }

                .site-header-nav {
                    width: 100%;
                    justify-content: flex-start !important;
                }

                .site-header-nav .btn {
                    flex: 1 1 calc(50% - 0.5rem);
                    min-width: 0;
                }

                .app-theme-toolbar {
                    justify-content: flex-start;
                }
            }

            @media (max-width: 575.98px) {
                .site-header-nav .btn {
                    padding: 0.7rem 0.8rem;
                    font-size: 0.98rem;
                }

                .app-theme-select {
                    width: 118px;
                }
            }
        </style>
    </th:block>

    <th:block th:fragment="commonScripts">
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
            crossorigin="anonymous"></script>
        <script>
            const appThemes = {
                default: {
                    label: "デフォルト",
                    vars: {
                        "--page-bg": "#eaf2fb",
                        "--page-bg-top": "#f3f8fe",
                        "--card": "#c7d8ec",
                        "--brand": "#c8defc",
                        "--brand-strong": "#aecdff",
                        "--deep": "#163b67",
                        "--surface": "#ffffff",
                        "--soft-surface": "#f4f8fd",
                        "--section-badge-bg": "#deebfb",
                        "--theme-text": "#17304f",
                        "--btn-on-brand": "#122e4b"
                    }
                },
                white: {
                    label: "1 白",
                    vars: {
                        "--page-bg": "#f6f6f6",
                        "--page-bg-top": "#ffffff",
                        "--card": "#d8d8d8",
                        "--brand": "#eeeeee",
                        "--brand-strong": "#dddddd",
                        "--deep": "#45505c",
                        "--surface": "#ffffff",
                        "--soft-surface": "#fbfbfb",
                        "--section-badge-bg": "#efefef",
                        "--theme-text": "#243240",
                        "--btn-on-brand": "#243240"
                    }
                },
                black: {
                    label: "2 黒",
                    vars: {
                        "--page-bg": "#e9edf2",
                        "--page-bg-top": "#f5f8fb",
                        "--card": "#ccd4dc",
                        "--brand": "#d7dde4",
                        "--brand-strong": "#c2cad3",
                        "--deep": "#2d3640",
                        "--surface": "#ffffff",
                        "--soft-surface": "#f6f8fa",
                        "--section-badge-bg": "#e4e9ee",
                        "--theme-text": "#1f2d3d",
                        "--btn-on-brand": "#1f2d3d"
                    }
                },
                red: {
                    label: "3 赤",
                    vars: {
                        "--page-bg": "#fcedf0",
                        "--page-bg-top": "#fff7f8",
                        "--card": "#e9c2ca",
                        "--brand": "#f5c2c7",
                        "--brand-strong": "#eb9daa",
                        "--deep": "#8b2238",
                        "--surface": "#ffffff",
                        "--soft-surface": "#fff5f6",
                        "--section-badge-bg": "#f8dce2",
                        "--theme-text": "#6a1730",
                        "--btn-on-brand": "#6a1730"
                    }
                },
                blue: {
                    label: "4 青",
                    vars: {
                        "--page-bg": "#edf5ff",
                        "--page-bg-top": "#f8fbff",
                        "--card": "#c7dbf4",
                        "--brand": "#cfe3ff",
                        "--brand-strong": "#aacdfb",
                        "--deep": "#204d80",
                        "--surface": "#ffffff",
                        "--soft-surface": "#f6faff",
                        "--section-badge-bg": "#dfecff",
                        "--theme-text": "#183a5a",
                        "--btn-on-brand": "#183a5a"
                    }
                },
                yellow: {
                    label: "5 黄",
                    vars: {
                        "--page-bg": "#fffcef",
                        "--page-bg-top": "#fffef8",
                        "--card": "#e8d9a2",
                        "--brand": "#ffe9a8",
                        "--brand-strong": "#f8d978",
                        "--deep": "#756000",
                        "--surface": "#ffffff",
                        "--soft-surface": "#fffdf4",
                        "--section-badge-bg": "#fff1bf",
                        "--theme-text": "#5e4d00",
                        "--btn-on-brand": "#5e4d00"
                    }
                },
                green: {
                    label: "6 緑",
                    vars: {
                        "--page-bg": "#eef8f1",
                        "--page-bg-top": "#f8fdf9",
                        "--card": "#c8dfcf",
                        "--brand": "#c6e5d0",
                        "--brand-strong": "#9ed0af",
                        "--deep": "#2d6f49",
                        "--surface": "#ffffff",
                        "--soft-surface": "#f5fbf7",
                        "--section-badge-bg": "#ddefe3",
                        "--theme-text": "#1f5d36",
                        "--btn-on-brand": "#1f5d36"
                    }
                },
                orange: {
                    label: "7 オレンジ",
                    vars: {
                        "--page-bg": "#fff4ea",
                        "--page-bg-top": "#fffaf5",
                        "--card": "#e8cfbd",
                        "--brand": "#ffd9ba",
                        "--brand-strong": "#f5bb85",
                        "--deep": "#965522",
                        "--surface": "#ffffff",
                        "--soft-surface": "#fff8f1",
                        "--section-badge-bg": "#fee7d4",
                        "--theme-text": "#72411b",
                        "--btn-on-brand": "#72411b"
                    }
                },
                pink: {
                    label: "8 ピンク",
                    vars: {
                        "--page-bg": "#fdf2f8",
                        "--page-bg-top": "#fff8fc",
                        "--card": "#ebd1df",
                        "--brand": "#f7d6e7",
                        "--brand-strong": "#efbad7",
                        "--deep": "#9a4f79",
                        "--surface": "#ffffff",
                        "--soft-surface": "#fff6fb",
                        "--section-badge-bg": "#f9e3ef",
                        "--theme-text": "#7c3158",
                        "--btn-on-brand": "#7c3158"
                    }
                }
            };

            function applyAppTheme(themeKey) {
                const selectedTheme = appThemes[themeKey] || appThemes.default;
                const root = document.documentElement;

                Object.entries(selectedTheme.vars).forEach(function ([cssVar, value]) {
                    root.style.setProperty(cssVar, value);
                });

                const themeDot = document.getElementById("appThemeDot");
                if (themeDot) {
                    themeDot.title = selectedTheme.label;
                }
            }

            document.addEventListener("DOMContentLoaded", function () {
                const storageKey = "autoraceapp-theme";
                const themeSelect = document.getElementById("appThemeSelect");

                if (!themeSelect) {
                    return;
                }

                const savedTheme = localStorage.getItem(storageKey) || "default";
                themeSelect.value = appThemes[savedTheme] ? savedTheme : "default";
                applyAppTheme(themeSelect.value);

                themeSelect.addEventListener("change", function () {
                    applyAppTheme(themeSelect.value);
                    localStorage.setItem(storageKey, themeSelect.value);
                });
            });
        </script>
    </th:block>
</th:block>
