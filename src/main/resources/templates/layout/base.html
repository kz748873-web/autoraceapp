<th:block xmlns:th="http://www.thymeleaf.org">
    <th:block th:fragment="commonHead(pageTitle)">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title th:text="${pageTitle}">オートレース予想補助アプリ</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
            crossorigin="anonymous">
        <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
        <style>
            :root {
                --page-bg: #eef4fb;
                --page-bg-top: #f7fafe;
                --card: #c5d6ea;
                --main: #17304f;
                --sub: #5c7188;
                --brand: #bfd8fb;
                --brand-strong: #98bee9;
                --deep: #1d4d82;
                --surface: #ffffff;
                --soft-surface: #f5f9fe;
                --section-badge-bg: #e2edf9;
                --theme-text: #17304f;
                --btn-on-brand: #123253;
                --header-surface: rgba(255, 255, 255, 0.96);
                --hero-panel-bg: rgba(255, 255, 255, 0.78);
                --hero-panel-text: #18324f;
                --hero-panel-border: rgba(255, 255, 255, 0.75);
            }

            body {
                background: linear-gradient(180deg, var(--page-bg-top) 0%, var(--page-bg) 100%);
                color: var(--main);
            }

            .app-shell {
                min-height: 100vh;
            }

            .page-card,
            .section-card,
            .page-panel {
                background: var(--surface);
                border: 1px solid var(--card);
                border-radius: 1.35rem;
                box-shadow: 0 0.9rem 1.8rem rgba(18, 61, 106, 0.08);
            }

            .page-card,
            .section-card {
                position: relative;
                overflow: hidden;
            }

            .page-card::before,
            .section-card::before {
                content: "";
                position: absolute;
                inset: 0 auto auto 0;
                width: 100%;
                height: 0.28rem;
                background: linear-gradient(90deg, var(--brand-strong), rgba(255, 255, 255, 0));
                pointer-events: none;
            }

            .section-badge {
                display: inline-flex;
                padding: 0.5rem 0.85rem;
                border-radius: 999px;
                font-weight: 700;
                font-size: 0.9rem;
                background: var(--section-badge-bg);
                color: var(--deep);
                border: 1px solid color-mix(in srgb, var(--brand-strong) 55%, white);
            }

            .section-title {
                font-size: 1.45rem;
                font-weight: 700;
            }

            .helper-text {
                color: var(--sub);
                line-height: 1.7;
            }

            .site-header {
                background: var(--header-surface) !important;
                backdrop-filter: blur(10px);
            }

            .btn-primary {
                background-color: var(--brand-strong) !important;
                border-color: var(--brand-strong) !important;
                color: var(--btn-on-brand) !important;
            }

            .btn-primary:hover,
            .btn-primary:focus {
                background-color: color-mix(in srgb, var(--brand-strong) 88%, black) !important;
                border-color: color-mix(in srgb, var(--brand-strong) 82%, black) !important;
                color: var(--btn-on-brand) !important;
            }

            .btn-outline-primary {
                color: var(--deep) !important;
                border-color: var(--brand-strong) !important;
                background: #ffffff !important;
            }

            .btn-outline-primary:hover,
            .btn-outline-primary:focus {
                background-color: var(--soft-surface) !important;
                border-color: var(--brand-strong) !important;
                color: var(--theme-text) !important;
            }

            .btn-outline-secondary {
                color: var(--theme-text) !important;
                border-color: color-mix(in srgb, var(--card) 75%, var(--brand-strong)) !important;
                background: #ffffff !important;
            }

            .btn-outline-secondary:hover,
            .btn-outline-secondary:focus {
                color: var(--theme-text) !important;
                border-color: var(--brand-strong) !important;
                background: var(--soft-surface) !important;
            }

            .text-primary {
                color: var(--deep) !important;
            }

            .app-theme-toolbar {
                display: inline-flex;
                align-items: center;
                justify-content: flex-end;
                gap: 0.45rem;
                flex-wrap: nowrap;
                padding: 0.18rem 0.45rem;
                border: 1px solid color-mix(in srgb, var(--card) 72%, white);
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.92);
                box-shadow: 0 0.35rem 0.8rem rgba(18, 61, 106, 0.06);
            }

            .app-theme-label {
                font-size: 0.82rem;
                font-weight: 700;
                color: var(--sub);
                white-space: nowrap;
            }

            .app-theme-select {
                width: 132px;
                min-width: 132px;
                border-radius: 999px;
                border-color: color-mix(in srgb, var(--card) 70%, var(--brand-strong));
                font-size: 0.82rem;
                line-height: 1.2;
                padding-top: 0.22rem;
                padding-bottom: 0.22rem;
                padding-left: 0.55rem;
                background-color: #ffffff;
                box-shadow: none;
                color: var(--theme-text);
            }

            .app-footer-note {
                color: #60758b;
                font-size: 0.98rem;
            }

            @media (max-width: 991.98px) {
                .site-header-actions {
                    width: 100%;
                    align-items: stretch !important;
                    gap: 0.75rem !important;
                }

                .site-header-actions > .d-flex {
                    width: 100%;
                    justify-content: space-between !important;
                    align-items: flex-start !important;
                }

                .site-header-nav {
                    width: 100%;
                    justify-content: flex-start !important;
                    row-gap: 0.7rem !important;
                }

                .site-header-nav .btn {
                    flex: 1 1 calc(50% - 0.5rem);
                    min-width: 0;
                    min-height: 3.1rem;
                }

                .app-theme-toolbar {
                    justify-content: flex-end;
                    align-self: flex-end;
                    margin-left: auto;
                    width: auto;
                    max-width: 100%;
                }
            }

            @media (max-width: 575.98px) {
                .site-header-nav {
                    gap: 0.6rem !important;
                }

                .site-header-nav .btn {
                    flex: 1 1 calc(50% - 0.35rem);
                    padding: 0.8rem 0.7rem;
                    font-size: 0.96rem;
                }

                .app-theme-toolbar {
                    padding: 0.18rem 0.35rem;
                }

                .app-theme-select {
                    width: 124px;
                    min-width: 124px;
                }
            }
        </style>
    </th:block>

    <th:block th:fragment="commonScripts">
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
            crossorigin="anonymous"></script>
        <script>
            const appThemes = {
                default: {
                    label: "デフォルト",
                    vars: {
                        "--page-bg": "#eef4fb",
                        "--page-bg-top": "#f7fafe",
                        "--card": "#c5d6ea",
                        "--brand": "#bfd8fb",
                        "--brand-strong": "#98bee9",
                        "--deep": "#1d4d82",
                        "--surface": "#ffffff",
                        "--soft-surface": "#f5f9fe",
                        "--section-badge-bg": "#e2edf9",
                        "--theme-text": "#17304f",
                        "--btn-on-brand": "#123253"
                    }
                },
                white: {
                    label: "1 白",
                    vars: {
                        "--page-bg": "#f7f7f6",
                        "--page-bg-top": "#ffffff",
                        "--card": "#d7d7d2",
                        "--brand": "#eeeeea",
                        "--brand-strong": "#d8d8d2",
                        "--deep": "#4c545d",
                        "--surface": "#ffffff",
                        "--soft-surface": "#fbfbf9",
                        "--section-badge-bg": "#f0f0ec",
                        "--theme-text": "#27313b",
                        "--btn-on-brand": "#27313b"
                    }
                },
                black: {
                    label: "2 黒",
                    vars: {
                        "--page-bg": "#edf0f4",
                        "--page-bg-top": "#f8f9fb",
                        "--card": "#bec7d2",
                        "--brand": "#4c5866",
                        "--brand-strong": "#36414d",
                        "--deep": "#2e3844",
                        "--surface": "#ffffff",
                        "--soft-surface": "#f5f7f9",
                        "--section-badge-bg": "#dde4ea",
                        "--theme-text": "#1e2730",
                        "--btn-on-brand": "#ffffff"
                    }
                },
                red: {
                    label: "3 赤",
                    vars: {
                        "--page-bg": "#fdf1f2",
                        "--page-bg-top": "#fff8f8",
                        "--card": "#e5c3cb",
                        "--brand": "#f0b8c2",
                        "--brand-strong": "#c95a72",
                        "--deep": "#8d233c",
                        "--surface": "#ffffff",
                        "--soft-surface": "#fff5f6",
                        "--section-badge-bg": "#f9dde3",
                        "--theme-text": "#5f1d2b",
                        "--btn-on-brand": "#ffffff"
                    }
                },
                blue: {
                    label: "4 青",
                    vars: {
                        "--page-bg": "#eef5ff",
                        "--page-bg-top": "#f8fbff",
                        "--card": "#c4d9f1",
                        "--brand": "#c1ddff",
                        "--brand-strong": "#5b97d6",
                        "--deep": "#21558b",
                        "--surface": "#ffffff",
                        "--soft-surface": "#f5f9ff",
                        "--section-badge-bg": "#dfebfa",
                        "--theme-text": "#173a5a",
                        "--btn-on-brand": "#ffffff"
                    }
                },
                yellow: {
                    label: "5 黄",
                    vars: {
                        "--page-bg": "#fffcef",
                        "--page-bg-top": "#fffef8",
                        "--card": "#ead89a",
                        "--brand": "#ffe28b",
                        "--brand-strong": "#d4ad2d",
                        "--deep": "#7a5f00",
                        "--surface": "#ffffff",
                        "--soft-surface": "#fffdf4",
                        "--section-badge-bg": "#fff0bd",
                        "--theme-text": "#5a4900",
                        "--btn-on-brand": "#3f3200"
                    }
                },
                green: {
                    label: "6 緑",
                    vars: {
                        "--page-bg": "#eef8f2",
                        "--page-bg-top": "#f8fcf9",
                        "--card": "#c4dfcd",
                        "--brand": "#b9e1c5",
                        "--brand-strong": "#4d9a67",
                        "--deep": "#2b6d46",
                        "--surface": "#ffffff",
                        "--soft-surface": "#f4faf6",
                        "--section-badge-bg": "#daeee1",
                        "--theme-text": "#1f5634",
                        "--btn-on-brand": "#ffffff"
                    }
                },
                orange: {
                    label: "7 オレンジ",
                    vars: {
                        "--page-bg": "#fff5ec",
                        "--page-bg-top": "#fffaf5",
                        "--card": "#e8cfbf",
                        "--brand": "#ffd0a8",
                        "--brand-strong": "#d88949",
                        "--deep": "#8f5728",
                        "--surface": "#ffffff",
                        "--soft-surface": "#fff8f2",
                        "--section-badge-bg": "#fee7d6",
                        "--theme-text": "#6a3d19",
                        "--btn-on-brand": "#ffffff"
                    }
                },
                pink: {
                    label: "8 ピンク",
                    vars: {
                        "--page-bg": "#fdf4f9",
                        "--page-bg-top": "#fff9fc",
                        "--card": "#ead2df",
                        "--brand": "#f6d0e4",
                        "--brand-strong": "#c86aa0",
                        "--deep": "#93466f",
                        "--surface": "#ffffff",
                        "--soft-surface": "#fff7fb",
                        "--section-badge-bg": "#f8e3ee",
                        "--theme-text": "#6e2f51",
                        "--btn-on-brand": "#ffffff"
                    }
                }
            };

            function applyAppTheme(themeKey) {
                const selectedTheme = appThemes[themeKey] || appThemes.default;
                const root = document.documentElement;

                Object.entries(selectedTheme.vars).forEach(function ([cssVar, value]) {
                    root.style.setProperty(cssVar, value);
                });
            }

            document.addEventListener("DOMContentLoaded", function () {
                const storageKey = "autoraceapp-theme";
                const themeSelect = document.getElementById("appThemeSelect");

                if (!themeSelect) {
                    return;
                }

                const savedTheme = localStorage.getItem(storageKey) || "default";
                themeSelect.value = appThemes[savedTheme] ? savedTheme : "default";
                applyAppTheme(themeSelect.value);

                themeSelect.addEventListener("change", function () {
                    applyAppTheme(themeSelect.value);
                    localStorage.setItem(storageKey, themeSelect.value);
                });
            });
        </script>
    </th:block>
</th:block>
