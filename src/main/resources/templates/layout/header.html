<header xmlns:th="http://www.thymeleaf.org" th:fragment="siteHeader" class="border-bottom bg-white shadow-sm site-header">
    <div class="container py-3">
        <div class="d-flex flex-column flex-xl-row justify-content-between align-items-xl-center gap-3">
            <div>
                <div class="text-primary fw-semibold mb-1">AUTO RACE SUPPORT APP</div>
                <h1 class="h3 fw-bold mb-0">オートレース予想補助アプリ</h1>
            </div>

            <div class="site-header-actions d-flex flex-column align-items-xl-end gap-2">
                <div class="w-100 d-flex justify-content-xl-end">
                    <div class="app-theme-toolbar" role="group" aria-label="テーマ選択">
                        <label for="appThemeSelect" class="app-theme-label mb-0">テーマ</label>
                        <select id="appThemeSelect" class="form-select form-select-sm app-theme-select" aria-label="カラーテーマ選択">
                            <option value="default">デフォルト</option>
                            <option value="white">1 白</option>
                            <option value="black">2 黒</option>
                            <option value="red">3 赤</option>
                            <option value="blue">4 青</option>
                            <option value="yellow">5 黄</option>
                            <option value="green">6 緑</option>
                            <option value="orange">7 オレンジ</option>
                            <option value="pink">8 ピンク</option>
                        </select>
                    </div>
                </div>

                <div class="d-flex flex-wrap align-items-center justify-content-xl-end gap-2 w-100">
                    <nav class="site-header-nav d-flex flex-wrap gap-2 justify-content-xl-end">
                        <a th:href="@{/}" class="btn btn-outline-primary btn-lg">TOPページ</a>
                        <a th:href="@{/records/new}" class="btn btn-outline-secondary btn-lg">新規記録</a>
                        <a th:href="@{/records}" class="btn btn-outline-secondary btn-lg">記録一覧を見る</a>
                        <a th:href="@{/glossaries}" class="btn btn-outline-secondary btn-lg">用語</a>
                        <a href="#help" class="btn btn-outline-secondary btn-lg">ヘルプ</a>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</header>
